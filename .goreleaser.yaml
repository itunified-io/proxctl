version: 2

project_name: proxclt

before:
  hooks:
    - go mod tidy

builds:
  - id: proxclt
    main: ./cmd/proxclt
    binary: proxclt
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/itunified-io/proxclt/pkg/version.Version={{.Version}}
      - -X github.com/itunified-io/proxclt/pkg/version.Commit={{.ShortCommit}}
      - -X github.com/itunified-io/proxclt/pkg/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: proxclt
    repository:
      owner: itunified-io
      name: homebrew-tap
    homepage: "https://github.com/itunified-io/proxclt"
    description: "Proxmox VM provisioning CLI — kickstart, lifecycle, workflows"
    license: "AGPL-3.0"
    install: |
      bin.install "proxclt"

dockers:
  - image_templates:
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files: [LICENSE]
  - image_templates:
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files: [LICENSE]

docker_manifests:
  - name_template: "ghcr.io/itunified-io/proxclt:{{ .Version }}"
    image_templates:
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-amd64"
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-arm64"
  - name_template: "ghcr.io/itunified-io/proxclt:latest"
    image_templates:
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-amd64"
      - "ghcr.io/itunified-io/proxclt:{{ .Version }}-arm64"
